name: Daily Apartment Scan

on:
  schedule:
    - cron: '0 * * * *'   # every hour — fastest possible notification
  workflow_dispatch:        # manual trigger via Scan Now button

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps + Playwright
        run: |
          pip install playwright --break-system-packages
          playwright install chromium --with-deps

      - name: Run apartment scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python apt_scanner.py
