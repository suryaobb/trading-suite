<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Journal — Trading Suite</title>
<link rel="stylesheet" href="shared.css">
<style>
.page-wrap { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

/* ─── STATS BAR ─── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-tile {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  text-align: center;
}

.st-val { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 3px; }
.st-label { font-size: 11px; font-weight: 600; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.5px; }

/* ─── TWO-COL LAYOUT ─── */
.journal-layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 16px;
  align-items: start;
}

@media (max-width: 800px) {
  .journal-layout { grid-template-columns: 1fr; }
}

/* ─── LOG FORM ─── */
.form-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  position: sticky;
  top: 68px;
}

.form-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
}

.fg { margin-bottom: 12px; }

.fg label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mute);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.fg input, .fg select, .fg textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  font-family: inherit;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); }
.fg input::placeholder, .fg textarea::placeholder { color: var(--text-faint); }
.fg textarea { resize: vertical; min-height: 70px; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

.tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tag-opt {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mute);
  cursor: pointer;
  transition: all 0.1s;
}
.tag-opt.selected { background: #0d1f30; border-color: var(--accent); color: var(--accent); }

.submit-btn {
  width: 100%;
  background: var(--grad);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.15s;
}
.submit-btn:hover { opacity: 0.9; }

.clear-form-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  font-size: 13px;
  color: var(--text-mute);
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.15s;
}
.clear-form-btn:hover { border-color: var(--red); color: var(--red); }

/* ─── TRADE LIST ─── */
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.list-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.header-actions { display: flex; gap: 8px; }

.export-btn, .clear-all-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text-mute);
  cursor: pointer;
  transition: all 0.15s;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent); }
.clear-all-btn:hover { border-color: var(--red); color: var(--red); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #2a3a55;
  font-size: 14px;
  line-height: 1.7;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
}

/* ─── TRADE ITEM ─── */
.trade-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.trade-item:hover { border-color: var(--border-hi); }

.trade-item.win  { border-left: 3px solid var(--green); }
.trade-item.loss { border-left: 3px solid var(--red); }
.trade-item.be   { border-left: 3px solid var(--yellow); }
.trade-item.planned { border-left: 3px solid var(--accent); }

.ti-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }

.ti-left { display: flex; align-items: center; gap: 10px; }

.ti-ticker {
  font-size: 18px;
  font-weight: 800;
  color: #fff;
}

.ti-dir {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
}
.ti-dir.call { background: #0d1f30; color: var(--accent); }
.ti-dir.put  { background: #1a0e0e; color: var(--red); }

.ti-date { font-size: 12px; color: var(--text-mute); }

.ti-pnl {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.ti-pnl.pos { color: var(--green); }
.ti-pnl.neg { color: var(--red); }
.ti-pnl.zero { color: var(--yellow); }
.ti-pnl.planned { color: var(--accent); font-size: 13px; }

.ti-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}

.ti-cell {
  background: var(--bg-input);
  border-radius: 7px;
  padding: 6px 8px;
}
.ti-cell .tc-label { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.ti-cell .tc-val   { font-size: 13px; font-weight: 700; color: var(--text-dim); }

.ti-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.ti-tag { background: var(--bg-input); border: 1px solid var(--border); border-radius: 5px; padding: 2px 8px; font-size: 11px; color: var(--text-mute); }

.ti-notes { font-size: 12px; color: var(--text-mute); font-style: italic; line-height: 1.4; }

.ti-actions { display: flex; gap: 6px; margin-top: 10px; }
.ti-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-mute);
  cursor: pointer;
  transition: all 0.15s;
}
.ti-btn:hover { border-color: var(--accent); color: var(--accent); }
.ti-btn.del:hover { border-color: var(--red); color: var(--red); }

/* ─── FILTER BAR ─── */
.filter-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.filter-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mute);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active { background: #0d1f30; border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- SHARED NAV -->
<nav class="nav">
  <div class="nav-logo">⚡ <span>Trading</span> Suite</div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Dashboard</a>
    <a class="nav-link" href="scanner.html">Scanner</a>
    <a class="nav-link" href="planner.html">Planner</a>
    <a class="nav-link active" href="journal.html">Journal</a>
  </div>
  <div class="nav-right">
    <span class="nav-clock" id="navClock">–</span>
  </div>
</nav>

<div class="page-wrap">

  <!-- STATS STRIP -->
  <div class="stats-strip" id="statsStrip">
    <div class="stat-tile"><div class="st-val" id="s-trades">0</div><div class="st-label">Total Trades</div></div>
    <div class="stat-tile"><div class="st-val" id="s-winrate">–</div><div class="st-label">Win Rate</div></div>
    <div class="stat-tile"><div class="st-val" id="s-pnl" style="color:var(--green)">$0</div><div class="st-label">Total P&L</div></div>
    <div class="stat-tile"><div class="st-val" id="s-avgwin" style="color:var(--green)">–</div><div class="st-label">Avg Win</div></div>
    <div class="stat-tile"><div class="st-val" id="s-avgloss" style="color:var(--red)">–</div><div class="st-label">Avg Loss</div></div>
    <div class="stat-tile"><div class="st-val" id="s-streak">–</div><div class="st-label">Streak</div></div>
  </div>

  <div class="journal-layout">

    <!-- ADD TRADE FORM -->
    <div class="form-card" id="formCard">
      <div class="form-title" id="formTitle">📒 Log a Trade</div>

      <div class="row2">
        <div class="fg">
          <label>Ticker</label>
          <input type="text" id="f-ticker" placeholder="SPY" style="text-transform:uppercase">
        </div>
        <div class="fg">
          <label>Date</label>
          <input type="date" id="f-date">
        </div>
      </div>

      <div class="row3">
        <div class="fg">
          <label>Direction</label>
          <select id="f-dir">
            <option value="CALL">📈 Call</option>
            <option value="PUT">📉 Put</option>
          </select>
        </div>
        <div class="fg">
          <label>Entry $</label>
          <input type="number" id="f-entry" placeholder="1.50" step="0.01">
        </div>
        <div class="fg">
          <label>Exit $</label>
          <input type="number" id="f-exit" placeholder="2.00" step="0.01">
        </div>
      </div>

      <div class="row2">
        <div class="fg">
          <label>Contracts</label>
          <input type="number" id="f-contracts" placeholder="2" min="1">
        </div>
        <div class="fg">
          <label>P&L ($)</label>
          <input type="number" id="f-pnl" placeholder="auto-calc" step="0.01">
        </div>
      </div>

      <div class="fg">
        <label>Result</label>
        <select id="f-result">
          <option value="win">✅ Win</option>
          <option value="loss">❌ Loss</option>
          <option value="be">🟡 Breakeven</option>
          <option value="planned">📋 Planned (no result yet)</option>
        </select>
      </div>

      <div class="fg">
        <label>Setup Tags</label>
        <div class="tag-row" id="tagRow">
          <span class="tag-opt" onclick="toggleTag(this,'EMA Cross')">EMA Cross</span>
          <span class="tag-opt" onclick="toggleTag(this,'VWAP Play')">VWAP Play</span>
          <span class="tag-opt" onclick="toggleTag(this,'ORB')">ORB</span>
          <span class="tag-opt" onclick="toggleTag(this,'Gap Fill')">Gap Fill</span>
          <span class="tag-opt" onclick="toggleTag(this,'Momentum')">Momentum</span>
          <span class="tag-opt" onclick="toggleTag(this,'Stop Hunt')">Stop Hunt</span>
          <span class="tag-opt" onclick="toggleTag(this,'Revenge')">⚠️ Revenge</span>
          <span class="tag-opt" onclick="toggleTag(this,'FOMO')">⚠️ FOMO</span>
        </div>
      </div>

      <div class="fg">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Thesis, what worked, what didn't, lesson learned..."></textarea>
      </div>

      <button class="submit-btn" onclick="submitTrade()">Save Trade</button>
      <button class="clear-form-btn" onclick="clearForm()">Clear Form</button>
    </div>

    <!-- TRADE LIST -->
    <div>
      <div class="list-header">
        <div class="list-title">Trade History</div>
        <div class="header-actions">
          <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
          <button class="clear-all-btn" onclick="clearAll()">🗑 Clear All</button>
        </div>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('win',this)">Wins</button>
        <button class="filter-btn" onclick="setFilter('loss',this)">Losses</button>
        <button class="filter-btn" onclick="setFilter('planned',this)">Planned</button>
      </div>

      <div id="tradeList"></div>
    </div>

  </div>
</div>

<script>
let trades = JSON.parse(localStorage.getItem('ts_trades')||'[]');
let editId = null;
let activeFilter = 'all';

// Set today's date
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

// Auto-calculate P&L when entry/exit/contracts change
['f-entry','f-exit','f-contracts'].forEach(id => {
  document.getElementById(id).addEventListener('input', autoPnl);
});

function autoPnl() {
  const entry = parseFloat(document.getElementById('f-entry').value);
  const exit  = parseFloat(document.getElementById('f-exit').value);
  const qty   = parseFloat(document.getElementById('f-contracts').value)||1;
  if (entry && exit) {
    const pnl = (exit - entry) * qty * 100;
    document.getElementById('f-pnl').value = pnl.toFixed(2);
    const resEl = document.getElementById('f-result');
    if (pnl > 0) resEl.value = 'win';
    else if (pnl < 0) resEl.value = 'loss';
    else resEl.value = 'be';
  }
}

function toggleTag(el, tag) { el.classList.toggle('selected'); }

function getSelectedTags() {
  return [...document.querySelectorAll('.tag-opt.selected')].map(el => el.textContent.replace('⚠️ ',''));
}

function clearForm() {
  document.getElementById('f-ticker').value='';
  document.getElementById('f-entry').value='';
  document.getElementById('f-exit').value='';
  document.getElementById('f-contracts').value='';
  document.getElementById('f-pnl').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-result').value='win';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.querySelectorAll('.tag-opt.selected').forEach(el=>el.classList.remove('selected'));
  editId=null;
  document.getElementById('formTitle').textContent='📒 Log a Trade';
  document.querySelector('.submit-btn').textContent='Save Trade';
}

function submitTrade() {
  const ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  if (!ticker) { document.getElementById('f-ticker').focus(); return; }

  const trade = {
    id: editId || Date.now(),
    ticker,
    date: document.getElementById('f-date').value,
    direction: document.getElementById('f-dir').value,
    entry: parseFloat(document.getElementById('f-entry').value)||0,
    exit:  parseFloat(document.getElementById('f-exit').value)||0,
    contracts: parseInt(document.getElementById('f-contracts ').value)||1,
    pnl: parseFloat(document.getElementById('f-pnl').value)||0,
    result: document.getElementById('f-result').value,
    tags: getSelectedTags(),
    notes: document.getElementById('f-notes').value.trim()
  };

  if (editId) {
    const idx = trades.findIndex(t=>t.id===editId);
    if (idx>-1) trades[idx]=trade;
  } else {
    trades.unshift(trade);
  }

  save(); clearForm(); renderAll();
}

function editTrade(id) {
  const t = trades.find(t=>t.id===id); if (!t) return;
  editId = id;
  document.getElementById('f-ticker').value=t.ticker;
  document.getElementById('f-date').value=t.date;
  document.getElementById('f-dir').value=t.direction;
  document.getElementById('f-entry').value=t.entry;
  document.getElementById('f-exit').value=t.exit;
  document.getElementById('f-contracts').value=t.contracts;
  document.getElementById('f-pnl').value=t.pnl;
  document.getElementById('f-result').value=t.result;
  document.getElementById('f-notes').value=t.notes||'';
  document.querySelectorAll('.tag-opt').forEach(el=>{
    el.classList.toggle('selected', t.tags&&t.tags.includes(el.textContent.replace('⚠️ ','')));
  });
  document.getElementById('formTitle').textContent='✏️ Edit Trade';
  document.querySelector('.submit-btn').textContent='Update Trade';
  document.getElementById('formCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function deleteTrade(id) {
  if (!confirm('Delete this trade?')) return;
  trades = trades.filter(t=>t.id!==id);
  save(); renderAll();
}

function clearAll() {
  if (!confirm('Delete ALL trades? This cannot be undone.')) return;
  trades=[]; save(); renderAll();
}

function setFilter(f, btn) {
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function save() { localStorage.setItem('ts_trades', JSON.stringify(trades)); }

function renderAll() { renderStats(); renderList(); }

function renderStats() {
  const completed = trades.filter(t=>t.result!=='planned');
  const wins  = completed.filter(t=>t.result==='win');
  const losses = completed.filter(t=>t.result==='loss');
  const totalPL = trades.reduce((s,t)=>s+(t.pnl||0),0);
  const winRate = completed.length ? ((wins.length/completed.length)*100).toFixed(0) : '–';

  document.getElementById('s-trades').textContent = trades.length;
  document.getElementById('s-winrate').textContent = winRate==='–' ? '–' : winRate+'%';
  document.getElementById('s-winrate').style.color = parseFloat(winRate)>=50 ? 'var(--green)' : 'var(--red)';
  const plEl=document.getElementById('s-pnl');
  plEl.textContent=(totalPL>=0?'+$':'-$')+Math.abs(totalPL).toFixed(0);
  plEl.style.color=totalPL>=0?'var(--green)':'var(--red)';

  const avgWin  = wins.length  ? wins.reduce((s,t)=>s+(t.pnl||0),0)/wins.length   : null;
  const avgLoss = losses.length ? losses.reduce((s,t)=>s+(t.pnl||0),0)/losses.length : null;
  document.getElementById('s-avgwin').textContent  = avgWin!=null  ? '+$'+avgWin.toFixed(0)  : '–';
  document.getElementById('s-avgloss').textContent = avgLoss!=null ? '-$'+Math.abs(avgLoss).toFixed(0) : '–';

  // Streak
  let streak=0;
  const sorted=[...trades].filter(t=>t.result!=='planned').sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (sorted.length) {
    const dir = sorted[0].result==='win' ? 'win' : 'loss';
    for (const t of sorted) { if(t.result===dir) streak++; else break; }
    const el=document.getElementById('s-streak');
    el.textContent=streak+(dir==='win'?' W':' L');
    el.style.color=dir==='win'?'var(--green)':'var(--red)';
  } else {
    document.getElementById('s-streak').textContent='–';
  }
}

function renderList() {
  const list = document.getElementById('tradeList');
  const filtered = activeFilter==='all' ? trades : trades.filter(t=>t.result===activeFilter);

  if (!filtered.length) {
    list.innerHTML=`<div class="empty-state">No trades yet.<br><br>Log your first trade using the form →<br><br><span style="font-size:12px">Or save a plan from the Trade Planner.</span></div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const pnlClass = t.result==='win' ? 'pos' : t.result==='loss' ? 'neg' : t.result==='be' ? 'zero' : 'planned';
    const pnlText  = t.result==='planned' ? 'Open' : (t.pnl>=0?'+$':'-$')+Math.abs(t.pnl).toFixed(0);
    const tags = (t.tags||[]).map(tag=>`<span class="ti-tag">${tag}</span>`).join('');
    return `
    <div class="trade-item ${t.result}">
      <div class="ti-top">
        <div class="ti-left">
          <span class="ti-ticker">${t.ticker}</span>
          <span class="ti-dir ${t.direction.toLowerCase()}">${t.direction}</span>
          <span class="ti-date">${t.date}</span>
        </div>
        <div class="ti-pnl ${pnlClass}">${pnlText}</div>
      </div>
      <div class="ti-grid">
        <div class="ti-cell"><div class="tc-label">Entry</div><div class="tc-val">${t.entry?'$'+t.entry.toFixed(2):'–'}</div></div>
        <div class="ti-cell"><div class="tc-label">Exit</div><div class="tc-val">${t.exit?'$'+t.exit.toFixed(2):'–'}</div></div>
        <div class="ti-cell"><div class="tc-label">Contracts</div><div class="tc-val">${t.contracts}</div></div>
        <div class="ti-cell"><div class="tc-label">Result</div><div class="tc-val" style="color:${t.result==='win'?'var(--green)':t.result==='loss'?'var(--red)':t.result==='be'?'var(--yellow)':'var(--accent)'}">${t.result.charAt(0).toUpperCase()+t.result.slice(1)}</div></div>
      </div>
      ${tags ? `<div class="ti-tags">${tags}</div>` : ''}
      ${t.notes ? `<div class="ti-notes">"${t.notes}"</div>` : ''}
      <div class="ti-actions">
        <button class="ti-btn" onclick="editTrade(${t.id})">✏️ Edit</button>
        <button class="ti-btn del" onclick="deleteTrade(${t.id})">🗑 Delete</button>
        ${t.result==='planned'?`<button class="ti-btn" onclick="openPlanner('${t.ticker}',${t.entry})">📋 Plan</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function openPlanner(ticker, price) {
  window.open('planner.html?ticker='+ticker+&price='+price, '_blank');
}

function exportCSV() {
  if (!trades.length) { alert('No trades to export.'); return; }
  const headers=['Date','Ticker','Direction','Entry','Exit','Contracts','PnL','Result','Tags','Notes'];
  const rows=trades.map(t=>[t.date,t.ticker,t.direction,t.entry,t.exit,t.contracts,t.pnl,t.result,(t.tags||[]).join('|'),`"${(t.notes||'').replace(/"/g,"'")}"`]);
  const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='trade-journal-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// Nav clock
function isDST(d){const j=new Date(d.getFullYear(),0,1),jul=new Date(d.getFullYear(),6,1);return d.getTimezoneOffset()<Math.max(j.getTimezoneOffset(),jul.getTimezoneOffset());}
function updateClock(){
  const now=new Date(),etOff=-5*60+(isDST(now)?60:0),et=new Date(now.getTime()+(now.getTimezoneOffset()+etOff)*60000);
  document.getElementById('navClock').textContent=et.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})+' ET';
}
updateClock(); setInterval(updateClock,1000);

renderAll();
</script>
</body>
</html>
